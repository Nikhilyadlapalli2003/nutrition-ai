{% extends 'base.html' %}

{% block content %}

<style>

/* ===== LOGIN PAGE BACKGROUND ===== */
.login-wrapper {
    min-height: 75vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Background Image */
.login-wrapper::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url("https://images.unsplash.com/photo-1512621776951-a57141f2eefd") center/cover no-repeat;
    filter: brightness(0.45);
    border-radius: 14px;
}

/* ===== LOGIN CARD ===== */
.login-card {
    position: relative;
    z-index: 2;
    width: 380px;
    padding: 35px;
    border-radius: 14px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(14px);
    box-shadow: 0 10px 35px rgba(0,0,0,0.25);
    color: white;
    text-align: center;
}

.login-card h3 {
    margin-bottom: 25px;
    font-weight: 600;
}

/* ===== INPUTS ===== */
.input-group {
    margin-bottom: 18px;
}

.input-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
}

.input-group input:focus {
    box-shadow: 0 0 0 2px #22c55e;
}

/* ===== BUTTON ===== */
.login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #16a34a;
}

/* ===== EXTRA TEXT ===== */
.extra-text {
    margin-top: 15px;
    font-size: 13px;
    opacity: 0.9;
}

.extra-text a {
    color: #bbf7d0;
    text-decoration: none;
    font-weight: 500;
}

.extra-text a:hover {
    text-decoration: underline;
}

</style>


<div class="login-wrapper">

    <div class="login-card">

        <h3>🔐 Login to Your Account</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>
        </form>

        <div class="extra-text">
            New user?
            <a href="{% url 'register' %}">Create an account</a>
        </div>

    </div>

</div>

{% endblock %}
